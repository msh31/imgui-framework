name: Release

on:
  push:
    tags: [ 'v*' ]

env:
  APP_NAME: template_app

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      package: true

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8

      - name: Rename artifacts
        run: |
          mv ${{ env.APP_NAME }}-linux/${{ env.APP_NAME }}-x86_64.AppImage ${{ env.APP_NAME }}-Linux-x86_64.AppImage
          mv ${{ env.APP_NAME }}-windows/${{ env.APP_NAME }}.exe ${{ env.APP_NAME }}-Windows-x86_64.exe
          mv ${{ env.APP_NAME }}-macos-arm64/${{ env.APP_NAME }}-macOS-arm64.zip ${{ env.APP_NAME }}-macOS-arm64.zip

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            ${{ env.APP_NAME }}-Linux-x86_64.AppImage \
            ${{ env.APP_NAME }}-Windows-x86_64.exe \
            ${{ env.APP_NAME }}-macOS-arm64.zip \
            --title "${{ github.ref_name }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

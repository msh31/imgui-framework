name: Build

on:
  workflow_call:
    inputs:
      package:
        description: Package binaries and upload artifacts
        type: boolean
        default: false

env:
  APP_NAME: template_app

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libgl1-mesa-dev libgtk-3-dev libwayland-dev wayland-protocols \
            pkg-config python3-pip ninja-build \
            gcc-14 g++-14
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100
          sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/g++-14 100

      - name: Install Conan
        run: pip install conan --break-system-packages

      - name: Detect Conan profile
        env:
          CC: gcc-14
          CXX: g++-14
        run: conan profile detect

      - name: Restore Conan cache
        id: conan-cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.conan2/p
          key: conan-linux-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-linux-

      - name: Install dependencies
        env:
          CC: gcc-14
          CXX: g++-14
        run: conan install . --build=missing -s build_type=Release -c tools.system.package_manager:mode=install -c tools.system.package_manager:sudo=True

      - name: Save Conan cache
        if: always() && steps.conan-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.conan2/p
          key: ${{ steps.conan-cache.outputs.cache-primary-key }}

      - name: Build
        env:
          CC: gcc-14
          CXX: g++-14
        run: |
          cmake --preset conan-release || cmake --preset conan-default
          cmake --build build --target ${{ env.APP_NAME }} -j$(nproc) 2>/dev/null || \
            cmake --build build/Release --target ${{ env.APP_NAME }} -j$(nproc)

      - name: Package AppImage
        if: inputs.package
        run: |
          cat > ${{ env.APP_NAME }}.desktop << 'EOF'
          [Desktop Entry]
          Name=${{ env.APP_NAME }}
          Exec=${{ env.APP_NAME }}
          Icon=${{ env.APP_NAME }}
          Type=Application
          Categories=Utility;
          EOF

          python3 -c "
          import struct, zlib, pathlib
          w = h = 256
          row = b'\x00' + bytes([201, 93, 56]) * w
          idat = zlib.compress(row * h)
          def chunk(tag, data):
              c = tag + data
              return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
          png = (b'\x89PNG\r\n\x1a\n'
              + chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0))
              + chunk(b'IDAT', idat)
              + chunk(b'IEND', b''))
          pathlib.Path('${{ env.APP_NAME }}.png').write_bytes(png)
          "

          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          wget -q "https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage"
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-appimage-x86_64.AppImage

          BINARY=$(find build -name "${{ env.APP_NAME }}" -type f | head -1)
          ARCH=x86_64 ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable "$BINARY" \
            --desktop-file ${{ env.APP_NAME }}.desktop \
            --icon-file ${{ env.APP_NAME }}.png \
            --output appimage

      - uses: actions/upload-artifact@v7
        if: inputs.package
        with:
          name: ${{ env.APP_NAME }}-linux
          path: ${{ env.APP_NAME }}-x86_64.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Conan
        run: pip install conan

      - name: Install jinja2 (required by glad build)
        run: pip install jinja2

      - name: Detect Conan profile
        run: conan profile detect

      - name: Restore Conan cache
        id: conan-cache
        uses: actions/cache/restore@v5
        with:
          path: C:\Users\runneradmin\.conan2\p
          key: conan-windows-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-windows-

      - name: Install dependencies
        env:
          CONAN_CENTER_BUILD_SERVICE: "1"
        run: conan install . --build=missing -s build_type=Release -s compiler.cppstd=23

      - name: Save Conan cache
        if: always() && steps.conan-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: C:\Users\runneradmin\.conan2\p
          key: ${{ steps.conan-cache.outputs.cache-primary-key }}

      - name: Build
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do call "%%i\VC\Auxiliary\Build\vcvars64.bat"
          cmake --preset conan-release
          if errorlevel 1 cmake --preset conan-default
          cmake --build build --target ${{ env.APP_NAME }}
          if errorlevel 1 cmake --build build\Release --target ${{ env.APP_NAME }}

      - name: Locate exe
        if: inputs.package
        shell: bash
        run: cp $(find build -name "${{ env.APP_NAME }}.exe" | head -1) ${{ env.APP_NAME }}.exe

      - uses: actions/upload-artifact@v7
        if: inputs.package
        with:
          name: ${{ env.APP_NAME }}-windows
          path: ${{ env.APP_NAME }}.exe

  build-macos-arm64:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install system dependencies
        run: brew install ninja pkg-config

      - name: Install Conan
        run: pip3 install conan --break-system-packages

      - name: Detect Conan profile
        run: conan profile detect

      - name: Restore Conan cache
        id: conan-cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.conan2/p
          key: conan-macos-arm64-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-macos-arm64-

      - name: Install dependencies
        run: conan install . --build=missing -s build_type=Release

      - name: Save Conan cache
        if: always() && steps.conan-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.conan2/p
          key: ${{ steps.conan-cache.outputs.cache-primary-key }}

      - name: Build
        run: |
          cmake --preset conan-release || cmake --preset conan-default
          cmake --build build --target ${{ env.APP_NAME }} -j$(nproc) 2>/dev/null || \
            cmake --build build/Release --target ${{ env.APP_NAME }} -j$(nproc)

      - name: Package
        if: inputs.package
        run: |
          APP=$(find build -name "${{ env.APP_NAME }}.app" -type d | head -1)
          cd "$(dirname "$APP")"
          zip -r "$GITHUB_WORKSPACE/${{ env.APP_NAME }}-macOS-arm64.zip" ${{ env.APP_NAME }}.app

      - uses: actions/upload-artifact@v7
        if: inputs.package
        with:
          name: ${{ env.APP_NAME }}-macos-arm64
          path: ${{ env.APP_NAME }}-macOS-arm64.zip

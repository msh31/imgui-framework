# Reference: https://build-cpp.github.io/cmkr/cmake-toml
[cmake]
version = "3.31"
cmkr-include = "cmkr.cmake"

[project]
name = "desktop-app-template"
description = "A simple template for cross-platform apps in C++"
languages = ["C", "CXX"]

[find-package.glfw3]
required = true

[find-package.imgui]
required = true

[find-package.nlohmann_json]
required = true

[find-package.spdlog]
required = true

[variables]
CMAKE_EXPORT_COMPILE_COMMANDS = true

[target.template_app]
type = "executable" 
sources = [
    "src/**.cpp",

    "vendor/imgui/imgui_stdlib.cpp",
    "vendor/glad/src/glad.c",
]
include-directories = [
    "src",
    "vendor/imgui",
    "vendor/glad/include",
]
compile-features = ["cxx_std_23"]
link-libraries = ["glfw", "imgui::imgui", "nlohmann_json::nlohmann_json", "spdlog::spdlog"]
precompile-headers = ["src/pch.hpp"]
cmake-after = """
find_path(IMGUI_INCLUDE_DIR imgui.h REQUIRED)
cmake_path(GET IMGUI_INCLUDE_DIR PARENT_PATH IMGUI_ROOT_DIR)
target_include_directories(template_app PRIVATE "${IMGUI_ROOT_DIR}/res/bindings")
target_sources(template_app PRIVATE
    "${IMGUI_ROOT_DIR}/res/bindings/imgui_impl_glfw.cpp"
    "${IMGUI_ROOT_DIR}/res/bindings/imgui_impl_opengl3.cpp"
)
"""
